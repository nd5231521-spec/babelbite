<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabelBite - Global Recipes</title>
    <!-- Stable Tailwind CSS CDN for Mobile Browsers -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf6ee; color: #2c3e50; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <header class="p-4 lg:px-12 bg-[#faf6ee]/90 backdrop-blur-md border-b border-orange-100 flex justify-between items-center sticky top-0 z-50">
        <span class="text-2xl font-serif font-bold text-[#d35400] tracking-wide cursor-pointer" onclick="window.location.reload()">BabelBite</span>
        <select id="langSelect" class="bg-white border border-orange-200 px-4 py-2 rounded-full text-sm font-medium cursor-pointer focus:outline-none shadow-sm">
            <option value="en">English 🇬🇧</option>
            <option value="hi">हिन्दी 🇮🇳</option>
            <option value="bn">বাংলা 🇧🇩</option>
            <option value="es">Español 🇪🇸</option>
            <option value="ar">العربية 🇦🇪</option>
        </select>
    </header>

    <!-- HERO SECTION -->
    <section class="text-center py-12 px-4 max-w-4xl mx-auto">
        <h1 id="heroTitle" class="text-4xl lg:text-6xl font-serif font-bold mb-6 leading-tight">World's Best Recipes, <span class="text-[#d35400]">In Your Language.</span></h1>
        <p id="heroSub" class="text-gray-600 text-base mb-8">Explore authentic recipes translated perfectly into your local tongue.</p>
        <div class="relative max-w-xl mx-auto">
            <input type="text" id="search" placeholder="Search recipes..." class="w-full bg-white rounded-full pl-6 pr-12 py-3 shadow-sm border border-gray-200 focus:outline-none focus:border-[#d35400] transition-colors">
            <i class="fa-solid fa-magnifying-glass absolute right-5 top-4 text-gray-400"></i>
        </div>
    </section>

    <!-- RECIPE GRID -->
    <main id="recipeGrid" class="px-4 lg:px-12 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16 w-full flex-grow"></main>

    <!-- RECIPE POPUP (MODAL) -->
    <div id="recipeModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[85vh] overflow-y-auto shadow-2xl relative flex flex-col">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-gray-100 hover:bg-gray-200 text-gray-700 w-10 h-10 rounded-full flex items-center justify-center z-10">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <div class="h-52 w-full overflow-hidden bg-gray-100 relative flex-shrink-0">
                <img id="modalImage" class="w-full h-full object-cover" src="" alt="">
                <div class="absolute bottom-4 left-4">
                    <span id="modalCategory" class="text-xs font-bold text-white bg-[#d35400] px-3 py-1 rounded-full shadow-sm"></span>
                </div>
            </div>
            <div class="p-6 overflow-y-auto">
                <h2 id="modalTitle" class="text-2xl font-serif font-bold mb-2"></h2>
                <p id="modalDesc" class="text-gray-500 text-sm mb-6 border-b border-gray-100 pb-4"></p>
                
                <div class="grid grid-cols-2 gap-4 mb-6 bg-orange-50 p-4 rounded-2xl text-sm font-medium text-gray-700">
                    <div><i class="fa-solid fa-clock text-[#d35400] mr-2"></i> <span id="modalTime"></span></div>
                    <div class="text-right"><i class="fa-solid fa-layer-group text-[#d35400] mr-2"></i> <span id="modalDiff"></span></div>
                </div>

                <div class="mb-6">
                    <h3 id="modalIngTitle" class="text-lg font-bold mb-3 text-[#d35400]"></h3>
                    <ul id="modalIngredients" class="list-disc list-inside space-y-2 text-gray-600 text-sm pl-2"></ul>
                </div>

                <div>
                    <h3 id="modalStepsTitle" class="text-lg font-bold mb-3 text-[#d35400]"></h3>
                    <ol id="modalSteps" class="list-decimal list-inside space-y-3 text-gray-600 text-sm pl-2"></ol>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-[#2c3e50] text-white/80 text-center py-6 border-t border-gray-800 mt-auto">
        <p class="text-sm font-medium">&copy; 2026 BabelBite. Powered by Passion.</p>
    </footer>

    <script>
        const recipes = [
          {
            "category": "Indian Classics",
            "prep_time": "25 mins",
            "image": "https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?auto=format&fit=crop&w=600&q=80",
            "languages": {
              "en": { "title": "Classic Butter Chicken", "desc": "A rich, creamy, and mildly spiced tomato curry.", "diff": "Medium", "ingTitle": "Ingredients", "stepsTitle": "Cooking Steps", "ingredients": ["500g Chicken", "2 cups Tomato Puree", "1 cup Fresh Cream", "2 tbsp Butter"], "steps": ["Marinate chicken with spices and yogurt.", "Pan-fry chicken until golden brown.", "Cook tomato puree with butter and add cream."] },
              "hi": { "title": "क्लासिक बटर चिकन", "desc": "एक मलाईदार और हल्के मसालों वाली टमाटर करी।", "diff": "मध्यम", "ingTitle": "सामग्री", "stepsTitle": "बनाने की विधि", "ingredients": ["500 ग्राम चिकन", "2 कप टमाटर प्यूरी", "1 cup ताजी क्रीम", "2 चम्मच मक्खन"], "steps": ["चिकन को मसालों और दही के साथ मैरीनेट करें।", "चिकन को सुनहरा होने तक फ्राई करें।", "टमाटर प्यूरी और मक्खन पकाकर क्रीम मिलाएं।"] },
              "bn": { "title": "ক্লাসিক বাটার চিকেন", "desc": "একটি রিচ এবং হালকা মশলাযুক্ত টমেটো কারি।", "diff": "মাঝারি", "ingTitle": "উপকরণ", "stepsTitle": "রান্নার ধাপ", "ingredients": ["৫০০ গ্রাম মাংস", "২ কাপ টমেটো পিউরি", "১ কাপ ক্রিম", "২ চামচ মাখন"], "steps": ["মাংস মশলা ও দই দিয়ে ম্যারিনেট করুন।", "মাংস হালকা ভেজে নিন।", "মাখনে টমেটো পিউরি কষিয়ে ক্রিম দিন।"] },
              "es": { "title": "Pollo a la Mantequilla", "desc": "Un curry de tomate rico, cremoso y algo especiado.", "diff": "Medio", "ingTitle": "Ingredientes", "stepsTitle": "Pasos", "ingredients": ["500g de Pollo", "2 tazas de Puré de Tomate", "1 taza de Crema"], "steps": ["Marinar el pollo con especias.", "Freír el pollo hasta que esté dorado.", "Cocinar el puré con mantequilla y crema."] },
              "ar": { "title": "دجاج بالزبدة الكلاسيكي", "desc": "كاري طماطم غني بالكريمة ومتبل خفيفاً.", "diff": "متوسط", "ingTitle": "المكونات", "stepsTitle": "الخطوات", "ingredients": ["500 غرام دجاج", "2 كوب بيوريه طماطم", "1 كوب كريمة"], "steps": ["تبلي الدجاج بالبهارات واللبن.", "اقلي الدجاج حتى يصبح ذهبي اللون.", "طهي الطماطم مع الزبدة والكريمة."] }
            }
          },
          {
            "category": "Street Food",
            "prep_time": "20 mins",
            "image": "https://images.unsplash.com/photo-1625220194761-4601934988e0?auto=format&fit=crop&w=600&q=80",
            "languages": {
              "en": { "title": "Steamed Momos", "desc": "Delicious dumplings stuffed with finely chopped vegetables.", "diff": "Easy", "ingTitle": "Ingredients", "stepsTitle": "Cooking Steps", "ingredients": ["1 cup Flour (Maida)", "1 cup Chopped Cabbage", "1 tbsp Ginger-Garlic paste"], "steps": ["Knead a soft dough with flour and water.", "Saute vegetables with ginger-garlic paste.", "Fill veggies in small dough discs and steam for 10 mins."] },
              "hi": { "title": "स्टीम्ड मोमोज", "desc": "बारीक कटी सब्जियों से भरे हुए स्वादिष्ट डंपलिंग्स।", "diff": "आसान", "ingTitle": "सामग्री", "stepsTitle": "बनाने की विधि", "ingredients": ["1 कप मैदा", "1 कप कटी हुई पत्तागोभी", "1 चम्मच अदरक-लहसुन पेस्ट"], "steps": ["मैदा और पानी के साथ नरम आटा गूंध लें।", "सब्जियों को अदरक-लहसुन के साथ भूनें।", "छोटी पूरियां बेलकर सब्जियां भरें और स्टीम करें।"] },
              "bn": { "title": "নরম স্টিমড মোমো", "desc": "মিহি করে কাটা সবজি দিয়ে তৈরি সুস্বাদু ডাম্পলিং।", "diff": "সহজ", "ingTitle": "উপকরণ", "stepsTitle": "রান্নার ধাপ", "ingredients": ["১ কাপ ময়দা", "১ কাপ কুচানো বাঁধাকপি", "১ চামচ আদা-রসুন বাটা"], "steps": ["ময়দা মেখে নরম ডো তৈরি করুন।", "সবজিগুলো আদা-রসুন দিয়ে হালকা নেড়ে নিন।", "লেচি কেটে সবজি ভরে ১০ মিনিট স্টিম করুন।"] },
              "es": { "title": "Momos al Vapor", "desc": "Deliciosas empanadillas rellenas de verduras picadas.", "diff": "Fácil", "ingTitle": "Ingredientes", "stepsTitle": "Pasos", "ingredients": ["1 taza de Harina", "1 taza de Repollo picado", "1 cucharada de Jengibre"], "steps": ["Amasar la harina con agua.", "Saltear las verduras con jengibre y ajo.", "Rellenar los discos de masa y cocinar al vapor."] },
              "ar": { "title": "موموس على البخار", "desc": "فطائر لذيذة محشوة بالخضار المفروم ناعماً.", "diff": "سهل", "ingTitle": "المكونات", "stepsTitle": "الخطوات", "ingredients": ["1 كوب دقيق", "1 كوب ملفوف مفروم", "1 معجون زنجبيل وثوم"], "steps": ["اعجني الدقيق بالماء لحصول على عجين.", "شوّحي الخضار مع الزنجبيل والثوم.", "احشي أقراص العجين واطهيها على البخار."] }
            }
          },
          {
            "category": "Italian Classics",
            "prep_time": "15 mins",
            "image": "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=600&q=80",
            "languages": {
              "en": { "title": "Margherita Pizza", "desc": "Classic pizza topped with fresh mozzarella and basil leaves.", "diff": "Easy", "ingTitle": "Ingredients", "stepsTitle": "Cooking Steps", "ingredients": ["1 Pizza Base", "1/2 cup Tomato Sauce", "1 cup Mozzarella Cheese", "Fresh Basil leaves"], "steps": ["Spread tomato sauce evenly over the pizza base.", "Top generously with mozzarella cheese.", "Bake at 220°C for 10 minutes, garnish with basil."] },
              "hi": { "title": "मार्गरीटा पिज्जा", "desc": "मोज़ारेला चीज़ और तुलसी के पत्तों से सजा क्लासिक पिज्जा।", "diff": "आसान", "ingTitle": "सामग्री", "stepsTitle": "बनाने की विधि", "ingredients": ["1 पिज्जा बेस", "1/2 कप टमाटर सॉस", "1 कप मोज़ारेला चीज़", "ताजा तुलसी के पत्ते"], "steps": ["पिज्जा बेस पर टमाटर का सॉस अच्छी तरह फैलाएं।", "ऊपर से भरपूर मोज़ारेला चीज़ डालें।", "220°C पर 10 मिनट बेक करें और तुलसी से सजाएं।"] },
              "bn": { "title": "মার্গারিটা পিৎজা", "desc": "মোজারেলা চিজ এবং তুলসী পাতা দিয়ে তৈরি ক্লাসিক পিৎজা।", "diff": "সহজ", "ingTitle": "উপকরণ", "stepsTitle": "রান্নার ধাপ", "ingredients": ["১টি পিৎজা বেস", "১/২ কাপ টমেটো সস", "১ কাপ মোজারেলা চিজ", "তুলসী পাতা"], "steps": ["পিৎজা বেসের ওপর ভালো করে টমেটো সস মাখিয়ে নিন।", "ওপরে প্রচুর মোজারেলা চিজ ছড়িয়ে দিন।", "২২০ ডিগ্রিতে ১০ মিনিট বেক করে তুলসী পাতা দিন।"] },
              "es": { "title": "Pizza Margherita", "desc": "Pizza clásica cubierta con mozzarella fresca y albahaca.", "diff": "Fácil", "ingTitle": "Ingredientes", "stepsTitle": "Pasos", "ingredients": ["1 Base de Pizza", "1/2 taza de Salsa Tomato", "1 taza de Queso Mozzarella"], "steps": ["Extender la salsa de tomate sobre la base.", "Cubrir con el queso mozzarella.", "Hornear a 220°C por 10 minutos y decorar con albahaca."] },
              "ar": { "title": "بيتزا مارغريتا", "desc": "بيتزا كلاسيكية مغطاة بجبنة الموزاريلا وأوراق الريحان.", "diff": "سهل", "ingTitle": "المكونات", "stepsTitle": "الخطوات", "ingredients": ["1 قاعدة بيتزا", "1/2 كوب صلصة طماطم", "1 كوب جبن موزاريلا"], "steps": ["افردي صلصة الطماطم على قاعدة البيتزا.", "ضعي جبنة الموزاريلا بكمية وفيرة.", "اخبزيها على 220 درجة لمدة 10 دقائق."] }
            }
          }
        ];

        let currentLang = 'en';

        const metaData = {
            en: { title: "World's Best Recipes, <span class='text-[#d35400]'>In Your Language.</span>", sub: "Explore authentic recipes translated perfectly into your local tongue.", search: "Search recipes..." },
            hi: { title: "दुनिया की बेहतरीन रेसिपीज़, <span class='text-[#d35400]'>आपकी अपनी भाषा में।</span>", sub: "दुनिया भर से चुनिंदा रेसिपीज़ का अन्वेषण करें जो आपकी मातृभाषा में हैं।", search: "रेसिपी खोजें..." },
            bn: { title: "বিশ্বের সেরা সব রেসিপি, <span class='text-[#d35400]'>আপনার নিজের ভাষায়।</span>", sub: "বিশ্বের দরবার থেকে বেছে নেওয়া খাঁটি রেসিপিগুলি নিজের ভাষায় দেখুন।", search: "রেসিপি খুঁজুন..." },
            es: { title: "Las mejores recetas, <span class='text-[#d35400]'>en tu idioma.</span>", sub: "Explore recetas auténticas traducidas a su lengua materna.", search: "Buscar..." },
            ar: { title: "أفضل الوصفات العالمية، <span class='text-[#d35400]'>بلغتك الخاصة.</span>", sub: "استكشف وصفات أصلية ومترجمة إلى لغتك المحلية تمامًا.", search: "بحث..." }
        };

        function render() {
            // Update Headers securely
            document.getElementById('heroTitle').innerHTML = metaData[currentLang].title;
            document.getElementById('heroSub').innerText = metaData[currentLang].sub;
            document.getElementById('search').placeholder = metaData[currentLang].search;
            document.body.style.direction = currentLang === 'ar' ? 'rtl' : 'ltr';

            const searchValue = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = '';
            
            // Foolproof rendering loop
            for (let i = 0; i < recipes.length; i++) {
                const recipe = recipes[i];
                const langData = recipe.languages[currentLang];
                
                const matchesSearch = langData.title.toLowerCase().includes(searchValue) || 
                                      langData.desc.toLowerCase().includes(searchValue) ||
                                      recipe.category.toLowerCase().includes(searchValue);
                
                if (!matchesSearch) continue;

                grid.innerHTML += `
                    <div onclick="openModal(${i})" class="bg-white rounded-3xl overflow-hidden shadow-sm border border-orange-50 flex flex-col justify-between hover:shadow-md transition-all cursor-pointer">
                        <div>
                            <div class="h-44 overflow-hidden bg-gray-100">
                                <img src="${recipe.image}" class="w-full h-full object-cover" alt="">
                            </div>
                            <div class="p-5">
                                <span class="text-[10px] font-bold text-[#d35400] bg-orange-50 px-2.5 py-1 rounded-full uppercase tracking-wider">${recipe.category}</span>
                                <h3 class="text-lg font-bold mt-2.5 mb-1">${langData.title}</h3>
                                <p class="text-gray-500 text-xs font-normal line-clamp-2">${langData.desc}</p>
                            </div>
                        </div>
                        <div class="px-5 pb-5 pt-3 border-t border-gray-50 flex justify-between text-[11px] text-gray-400">
                            <span><i class="fa-solid fa-clock"></i> ${recipe.prep_time}</span>
                            <span>${langData.diff}</span>
                        </div>
                    </div>
                `;
            }
        }

        function openModal(index) {
            const recipe = recipes[index];
            const langData = recipe.languages[currentLang];

            document.getElementById('modalImage').src = recipe.image;
            document.getElementById('modalCategory').innerText = recipe.category;
            document.getElementById('modalTitle').innerText = langData.title;
            document.getElementById('modalDesc').innerText = langData.desc;
            document.getElementById('modalTime').innerText = recipe.prep_time;
            document.getElementById('modalDiff').innerText = langData.diff;
            
            document.getElementById('modalIngTitle').innerText = langData.ingTitle;
            document.getElementById('modalStepsTitle').innerText = langData.stepsTitle;

            const ingList = document.getElementById('modalIngredients');
            ingList.innerHTML = '';
            langData.ingredients.forEach(ing => { ingList.innerHTML += `<li>${ing}</li>`; });

            const stepsList = document.getElementById('modalSteps');
            stepsList.innerHTML = '';
            langData.steps.forEach(step => { stepsList.innerHTML += `<li>${step}</li>`; });

            document.getElementById('recipeModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('recipeModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('recipeModal');
            if (event.target == modal) { closeModal(); }
        }

        document.getElementById('search').addEventListener('input', render);
        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            render();
        });

        // Safe Initial Call
        render();
    </script>
</body>
</html>
