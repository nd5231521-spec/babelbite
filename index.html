<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabelBite - Global Recipes</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf6ee; color: #2c3e50; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <header class="p-4 lg:px-12 bg-[#faf6ee]/90 backdrop-blur-md border-b border-[#d35400]/10 flex justify-between items-center sticky top-0 z-50">
        <span class="text-2xl font-serif font-bold text-[#d35400] tracking-wide">BabelBite</span>
        <select id="langSelect" class="bg-white border border-[#d35400]/20 px-4 py-2 rounded-full text-sm font-medium cursor-pointer focus:outline-none shadow-sm">
            <option value="en">English 🇬🇧</option>
            <option value="hi">हिन्दी 🇮🇳</option>
            <option value="bn">বাংলা 🇧🇩</option>
            <option value="es">Español 🇪🇸</option>
            <option value="ar">العربية 🇦🇪</option>
        </select>
    </header>

    <!-- HERO SECTION -->
    <section class="text-center py-16 px-4 max-w-4xl mx-auto">
        <h1 id="heroTitle" class="text-4xl lg:text-6xl font-serif font-bold mb-6 leading-tight">World's Best Recipes, <span class="text-[#d35400]">In Your Language.</span></h1>
        <p id="heroSub" class="text-gray-600 text-lg mb-8">Explore authentic recipes translated perfectly into your local tongue.</p>
        <div class="relative max-w-xl mx-auto">
            <input type="text" id="search" placeholder="Search recipes..." class="w-full bg-white rounded-full pl-6 pr-12 py-3 shadow-sm border border-gray-200 focus:outline-none focus:border-[#d35400] transition-colors">
            <i class="fa-solid fa-magnifying-glass absolute right-5 top-4 text-gray-400"></i>
        </div>
    </section>

    <!-- RECIPE GRID -->
    <main id="recipeGrid" class="px-4 lg:px-12 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16 w-full flex-grow"></main>

    <!-- FOOTER -->
    <footer class="bg-[#2c3e50] text-white/80 text-center py-6 border-t border-gray-800 mt-auto">
        <p class="text-sm font-medium">&copy; 2026 BabelBite. Powered by Passion.</p>
    </footer>

    <script>
        // डेटा को सीधे यहीं रख दिया ताकि कोई नेटवर्क एरर कभी आ ही न सके!
        const recipes = [
          {
            "category": "Indian Classics",
            "prep_time": "25 mins",
            "image": "https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?auto=format&fit=crop&w=600&q=80",
            "languages": {
              "en": { "title": "Classic Butter Chicken", "desc": "A rich, creamy, and mildly spiced tomato curry.", "diff": "Medium" },
              "hi": { "title": "क्लासिक बटर चिकन", "desc": "एक समृद्ध, मलाईदार और हल्के मसालों वाली टमाटर करी।", "diff": "मध्यम" },
              "bn": { "title": "ক্লাসিক বাটার চিকেন", "desc": "একটি রিচ, ক্রিমি এবং হালকা মশলাযুক্ত টমেটো কারি।", "diff": "মাঝারি" },
              "es": { "title": "Pollo a la Mantequilla", "desc": "Un curry de tomate rico, cremoso y ligeramente especiado.", "diff": "Medio" },
              "ar": { "title": "دجاج بالزبدة الكلاسيكي", "desc": "كاري طماطم غني بالكريمة ومتبل خفيفاً.", "diff": "متوسط" }
            }
          },
          {
            "category": "Street Food",
            "prep_time": "20 mins",
            "image": "https://images.unsplash.com/photo-1625220194761-4601934988e0?auto=format&fit=crop&w=600&q=80",
            "languages": {
              "en": { "title": "Steamed Momos", "desc": "Delicious dumplings stuffed with finely chopped vegetables.", "diff": "Easy" },
              "hi": { "title": "स्टीम्ड मोमोज", "desc": "बारीक कटी सब्जियों से भरे हुए स्वादिष्ट डंपलिंग्स।", "diff": "आसान" },
              "bn": { "title": "স্টিমড মোমো", "desc": "মিহি করে কাটা সবজি দিয়ে তৈরি সুস্বাদু ডাম্পলিং।", "diff": "সহজ" },
              "es": { "title": "Momos al Vapor", "desc": "Deliciosas empanadillas rellenas de verduras picadas.", "diff": "Fácil" },
              "ar": { "title": "موموس على البخار", "desc": "فطائر لذيذة محشوة بالخخضار المفروم فرماً ناعماً.", "diff": "سهل" }
            }
          },
          {
            "category": "Royal Course",
            "prep_time": "45 mins",
            "image": "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?auto=format&fit=crop&w=600&q=80",
            "languages": {
              "en": { "title": "Hyderabadi Biryani", "desc": "Fragrant basmati rice layered with spiced marinated ingredients.", "diff": "Hard" },
              "hi": { "title": "हैदराबादी बिरयानी", "desc": "मसालेदार मैरीनेट की गई सामग्रियों के साथ सुगंधित बासमती चावल।", "diff": "कठिन" },
              "bn": { "title": "হায়দ্রাবাদি বিরিয়ানি", "desc": "সুগন্ধি বাসমতি চাল এবং মশলাদার ম্যারিনেট করা উপাদানের স্তর।", "diff": "কঠิน" },
              "es": { "title": "Biryani de Hyderabadi", "desc": "Arroz basmati aromático cocinado con especias finas.", "diff": "Difícil" },
              "ar": { "title": "بريانى حيدر أباد", "desc": "أرز بسمتي عطري مطبوخ مع التوابل الفاخرة.", "diff": "صعب" }
            }
          },
          {
            "category": "Italian",
            "prep_time": "15 mins",
            "image": "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=600&q=80",
            "languages": {
              "en": { "title": "Margherita Pizza", "desc": "Classic pizza topped with fresh mozzarella and basil leaves.", "diff": "Easy" },
              "hi": { "title": "मार्गरीटा पिज्जा", "desc": "ताजा मोज़ारेला चीज़ और तुलसी के पत्तों से सजा क्लासिक पिज्जा।", "diff": "आसान" },
              "bn": { "title": "মার্গারিটা পিৎজা", "desc": "তাজা মোজারেলা চিজ এবং তুলসী পাতা দিয়ে তৈরি ক্লাসিক পিৎজা।", "diff": "সহজ" },
              "es": { "title": "Pizza Margherita", "desc": "Pizza clásica cubierta con mozzarella fresca y albahaca.", "diff": "Fácil" },
              "ar": { "title": "بيتزا مارغريتا", "desc": "بيتزا كلاسيكية مغطاة بجبنة الموزاريلا الطازجة وأوراق الريحان.", "diff": "سهل" }
            }
          },
          {
            "category": "Desserts",
            "prep_time": "30 mins",
            "image": "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=600&q=80",
            "languages": {
              "en": { "title": "Chocolate Brownie", "desc": "Fudgy and rich chocolate cake bars served warm.", "diff": "Easy" },
              "hi": { "title": "चॉकलेट ब्राउनी", "desc": "गरमागरम परोसी जाने वाली मखमली and भरपूर चॉकलेट केक बार्स।", "diff": "आसान" },
              "bn": { "title": "চকলেট ব্রাউনি", "desc": "গরম গরম পরিবেশন করা রিচ চকোলেট কেক বার।", "diff": "সহজ" },
              "es": { "title": "Brownie de Chocolate", "desc": "Bizcocho de chocolate denso y delicioso servido caliente.", "diff": "Fácil" },
              "ar": { "title": "براوني الشوكولاتة", "desc": "قطع كعكة الشوكولاتة الغنية والدافئة.", "diff": "سهل" }
            }
          }
        ];

        let currentLang = 'en';

        const metaData = {
            en: { title: "World's Best Recipes, <span class='text-[#d35400]'>In Your Language.</span>", sub: "Explore authentic recipes translated perfectly into your local tongue.", search: "Search recipes..." },
            hi: { title: "दुनिया की बेहतरीन रेसिपीज़, <span class='text-[#d35400]'>आपकी अपनी भाषा में।</span>", sub: "दुनिया भर से चुनिंदा रेसिपीज़ का अन्वेषण करें जो आपकी मातृभाषा में हैं।", search: "रेसिपी खोजें..." },
            bn: { title: "বিশ্বের সেরা সব রেসিপি, <span class='text-[#d35400]'>আপনার নিজের ভাষায়।</span>", sub: "বিশ্বের দরবার থেকে বেছে নেওয়া খাঁটি রেসিপিগুলি নিজের ভাষায় দেখুন।", search: "রেসিপি খুঁজুন..." },
            es: { title: "Las mejores recetas, <span class='text-[#d35400]'>en tu idioma.</span>", sub: "Explore recetas auténticas traducidas a su lengua materna.", search: "Buscar..." },
            ar: { title: "أفضل الوصفات العالمية، <span class='text-[#d35400]'>بلغتك الخاصة.</span>", sub: "استكشف وصفات أصلية ومترجمة إلى لغتك المحلية تمامًا.", search: "بحث..." }
        };

        function render() {
            document.getElementById('heroTitle').innerHTML = metaData[currentLang].title;
            document.getElementById('heroSub').innerText = metaData[currentLang].sub;
            document.getElementById('search').placeholder = metaData[currentLang].search;
            document.body.style.direction = currentLang === 'ar' ? 'rtl' : 'ltr';

            const searchValue = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = '';
            
            const filteredRecipes = recipes.filter(recipe => {
                const langData = recipe.languages[currentLang];
                return langData.title.toLowerCase().includes(searchValue) || 
                       langData.desc.toLowerCase().includes(searchValue) ||
                       recipe.category.toLowerCase().includes(searchValue);
            });

            if(filteredRecipes.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400">No recipes found for "${searchValue}"</div>`;
                return;
            }

            filteredRecipes.forEach(recipe => {
                const langData = recipe.languages[currentLang];
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition-shadow">
                        <div>
                            <div class="h-48 overflow-hidden bg-gray-100">
                                <img src="${recipe.image}" class="w-full h-full object-cover" alt="${langData.title}">
                            </div>
                            <div class="p-6">
                                <span class="text-xs font-bold text-[#d35400] bg-orange-50 px-3 py-1 rounded-full">${recipe.category}</span>
                                <h3 class="text-xl font-bold mt-3 mb-1">${langData.title}</h3>
                                <p class="text-gray-500 text-sm font-normal">${langData.desc}</p>
                            </div>
                        </div>
                        <div class="px-6 pb-6 pt-4 border-t border-gray-50 flex justify-between text-xs text-gray-400">
                            <span><i class="fa-solid fa-clock"></i> ${recipe.prep_time}</span>
                            <span>${langData.diff}</span>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('search').addEventListener('input', render);

        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            render();
        });

        // तुरंत बिना किसी कनेक्शन के रेंडर करें
        render();
    </script>
</body>
</html>
